<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Final Project</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <section id="landing">
        <nav>
          <div class="row nav__row">
            <div class="nav__logo">
              <img
                class="nav__logo--img"
                src="./assets/logo.2c489fc453a1783cbadacf914efa3df6.svg"
              />
              <h3 class="nav__logo--title">Treact</h1>
            </div>
            <div class="nav__list">
              <ul class="nav__list">
                <li class="nav__link">About</li>
                <li class="nav__link">Blog</li>
                <li class="nav__link">Pricing</li>
                <li class="nav__link">Contact</li>
                <li class="nav__link">Login</li>
              </ul>
            </div>
            <button class="nav__btn">Sign Up</button>
          </div>
        </nav>
        <div class="container">
            <div class="row hero">
                <div class="hero__info">
                    <div class="hero__info--intro">
                        <h1 class="hero__info--title">
                            Beatiful React Templates <span class="purple"> for you.</span>
                        </h1>
                        <p class="hero__info--para">
                            Our templates are easy to setup, understand and customize. Fully
                            modular components with a variety of pages and components.
                        </p>
                    </div>
                    <div class="hero__info--submit">
                        <form class="cta">
                            <input type="email" placeholder="Your E-mail Address" />
                            <button type="submit">Get Started</button>
                        </form>
                    </div>
                    <div class="hero__info--customers">
                        <p class="subtext__our-customers">OUR TRUSTED CUSTOMERS</p>
                        <div class="cx-logos">
                            <img src="./assets/customers-logo-strip.680ac7c2e8ae28161d2c.png" clas="hero__info--customer-logos">
                        </div>
                    </div>
                </div>
                <div class="hero__img">
                    <img src="./assets/undraw_winter-designer_a6kq.svg" alt="Winter Office">
                </div>
            </div>
        </div>
      </section>
    </header>
    <main></main>
  </body>
</html>
